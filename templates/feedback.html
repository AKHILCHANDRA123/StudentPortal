{% extends 'base.html' %}

{% block title %}Feedback | Student Portal{% endblock %}
{% block headline %}Student Feedback{% endblock %}
{% block subtitle %}Send feedback that helps your instructors improve.{% endblock %}

{% block content %}
<div class="card" style="max-width: 680px; margin: 0 auto;">
    <form class="form-shell" action="/submit_feedback" method="POST">
        <div class="field-group">
            <input type="text" id="faculty" name="faculty" placeholder=" " required />
            <label for="faculty">Faculty Name</label>
        </div>
        <div class="field-group">
            <input type="text" id="subject" name="subject" placeholder=" " required />
            <label for="subject">Subject</label>
        </div>
        <div class="field-group">
            <input type="number" id="rating" name="rating" min="1" max="5" placeholder=" " required />
            <label for="rating">Rating (1-5)</label>
        </div>
        <div class="field-group">
            <textarea id="comments" name="comments" placeholder=" "></textarea>
            <label for="comments">Comments</label>
        </div>
        <div class="button-row">
            <button class="button button-primary" type="submit">Submit Feedback</button>
            <a class="button button-secondary" href="/dashboard">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
